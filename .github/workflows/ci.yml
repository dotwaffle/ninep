name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Build
        run: go build -trimpath ./...

      - name: Compile integration tests
        run: go test -tags integration -run ^$ ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Fuzz p9l codec
        run: go test -fuzz=FuzzCodecRoundTrip -fuzztime=30s ./proto/p9l/

      - name: Fuzz p9u codec
        run: go test -fuzz=FuzzCodecRoundTrip -fuzztime=30s ./proto/p9u/

  stress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Stress tests (requestCtx race surface)
        run: go test -tags=stress -race -count=1 ./server/...
